  <line x1="20" y1="56" x2="4" y2="58" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" />
  <line x1="80" y1="52" x2="97" y2="51" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" />
  <line x1="80" y1="56" x2="96" y2="58" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" />
