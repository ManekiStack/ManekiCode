  <path d="M 24,32 L 17,11 L 34,24 Z" fill="#F1948A" />
  <path d="M 78,35 L 88,5 L 62,25 Z" fill="#E67E22" />
  <path d="M 76,32 L 83,11 L 66,24 Z" fill="#F1948A" />
  
  <!-- Head -->
