  <!-- Cheek white patches -->
  <path d="M 50,58 C 45,58 35,62 30,55 C 25,48 30,42 40,42 C 45,42 50,47 50,50 C 50,47 55,42 60,42 C 70,42 75,48 70,55 C 65,62 55,58 50,58 Z" fill="#FDFEFE" />
  
  <!-- Forehead stripes -->
  <path d="M 45,18 L 50,28 L 55,18 Z" fill="#D35400" />
  <path d="M 37,20 L 41,27 L 43,20 Z" fill="#D35400" />
  <path d="M 63,20 L 59,27 L 57,20 Z" fill="#D35400" />
  
  <!-- Body/side stripes -->
  <path d="M 12,46 L 22,48 L 12,52 Z" fill="#D35400" />
  <path d="M 88,46 L 78,48 L 88,52 Z" fill="#D35400" />

  <!-- Eyes -->
  <!-- Cute anime/chibi eyes -->
  <!-- Left Eye -->
  <ellipse cx="32" cy="44" rx="7" ry="9" fill="#1C2833" />
  <circle cx="30" cy="40" r="2.5" fill="#FFFFFF" />
  <circle cx="34" cy="47" r="1" fill="#FFFFFF" />
  
  <!-- Right Eye -->
  <ellipse cx="68" cy="44" rx="7" ry="9" fill="#1C2833" />
  <circle cx="66" cy="40" r="2.5" fill="#FFFFFF" />
  <circle cx="70" cy="47" r="1" fill="#FFFFFF" />

  <!-- Cute blush cheeks -->
  <ellipse cx="22" cy="54" rx="5" ry="3" fill="#FADBD8" opacity="0.8" />
  <ellipse cx="78" cy="54" rx="5" ry="3" fill="#FADBD8" opacity="0.8" />

  <!-- Nose -->
